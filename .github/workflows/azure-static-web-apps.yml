name: Azure Static Web Apps CI/CD

permissions:
  contents: read
  id-token: write

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  deploy_analysis_function:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AZURE_ANALYSIS_FUNCTIONAPP_NAME: ${{ secrets.AZURE_ANALYSIS_FUNCTIONAPP_NAME }}
      AZURE_ANALYSIS_FUNCTIONAPP_RESOURCE_GROUP: ${{ secrets.AZURE_ANALYSIS_FUNCTIONAPP_RESOURCE_GROUP }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Azure login
        if: env.AZURE_ANALYSIS_FUNCTIONAPP_NAME != '' && env.AZURE_ANALYSIS_FUNCTIONAPP_RESOURCE_GROUP != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Package Python analysis worker
        if: env.AZURE_ANALYSIS_FUNCTIONAPP_NAME != '' && env.AZURE_ANALYSIS_FUNCTIONAPP_RESOURCE_GROUP != ''
        run: |
          rm -rf analysis-function/autoinsight_analysis
          cp -R analysis-worker/autoinsight_analysis analysis-function/autoinsight_analysis
          python -m compileall analysis-function
      - name: Remove unsupported Flex Function App settings
        if: env.AZURE_ANALYSIS_FUNCTIONAPP_NAME != '' && env.AZURE_ANALYSIS_FUNCTIONAPP_RESOURCE_GROUP != ''
        run: |
          az functionapp config appsettings delete \
            --name "$AZURE_ANALYSIS_FUNCTIONAPP_NAME" \
            --resource-group "$AZURE_ANALYSIS_FUNCTIONAPP_RESOURCE_GROUP" \
            --setting-names SCM_DO_BUILD_DURING_DEPLOYMENT ENABLE_ORYX_BUILD || true
      - name: Deploy Python analysis Function App
        if: env.AZURE_ANALYSIS_FUNCTIONAPP_NAME != '' && env.AZURE_ANALYSIS_FUNCTIONAPP_RESOURCE_GROUP != ''
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_ANALYSIS_FUNCTIONAPP_NAME }}
          package: analysis-function
          resource-group: ${{ env.AZURE_ANALYSIS_FUNCTIONAPP_RESOURCE_GROUP }}
          remote-build: true

  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix api --omit=dev
      - run: npm run build
      - name: Copy Static Web Apps config
        run: cp staticwebapp.config.json dist/staticwebapp.config.json
      - name: Deploy to Azure Static Web Apps
        run: npx -y @azure/static-web-apps-cli deploy ./dist --api-location ./api --api-language node --api-version 20 --swa-config-location ./dist --deployment-token "$AZURE_STATIC_WEB_APPS_API_TOKEN" --env production
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
