name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  deploy_analysis_function:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AZURE_ANALYSIS_FUNCTIONAPP_NAME: ${{ secrets.AZURE_ANALYSIS_FUNCTIONAPP_NAME }}
      AZURE_ANALYSIS_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_ANALYSIS_FUNCTIONAPP_PUBLISH_PROFILE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Package Python analysis worker
        if: env.AZURE_ANALYSIS_FUNCTIONAPP_NAME != '' && env.AZURE_ANALYSIS_FUNCTIONAPP_PUBLISH_PROFILE != ''
        run: |
          cp -R analysis-worker/autoinsight_analysis analysis-function/autoinsight_analysis
          python -m compileall analysis-function
      - name: Deploy Python analysis Function App
        if: env.AZURE_ANALYSIS_FUNCTIONAPP_NAME != '' && env.AZURE_ANALYSIS_FUNCTIONAPP_PUBLISH_PROFILE != ''
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_ANALYSIS_FUNCTIONAPP_NAME }}
          package: analysis-function
          publish-profile: ${{ env.AZURE_ANALYSIS_FUNCTIONAPP_PUBLISH_PROFILE }}

  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix api --omit=dev
      - run: npm run build
      - name: Copy Static Web Apps config
        run: cp staticwebapp.config.json dist/staticwebapp.config.json
      - name: Deploy to Azure Static Web Apps
        run: npx -y @azure/static-web-apps-cli deploy ./dist --api-location ./api --api-language node --api-version 20 --swa-config-location ./dist --deployment-token "$AZURE_STATIC_WEB_APPS_API_TOKEN" --env production
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
